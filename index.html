/* ── Reset ── */
*, ::before, ::after { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
html, body { background:var(--bg); color:var(--fg); font-family:var(--f); font-size:17px; line-height:1.47; -webkit-font-smoothing:antialiased; overscroll-behavior:none; }

/* ── Liquid Glass mixin as a class ── */
.glass {
  background: var(--glass-bg);
  backdrop-filter: saturate(180%) blur(var(--glass-blur));
  -webkit-backdrop-filter: saturate(180%) blur(var(--glass-blur));
  border: 0.5px solid var(--glass-bdr);
  box-shadow: 0 2px 24px var(--glass-shad), inset 0 1px 0 var(--glass-inner);
}

/* ════ LAYOUT ════ */
.page { max-width: 430px; margin: 0 auto; min-height: 100dvh; display: flex; flex-direction: column; position: relative; }
@media (min-width: 768px) { .page { max-width: 600px; } }
@media (min-width: 1024px) { .page { max-width: 720px; box-shadow: 0 0 60px rgba(0,0,0,.12); min-height: 100vh; } }

/* ── Full-bleed map ── */
#map-wrap { position: relative; width: 100%; height: 65vw; max-height: 400px; min-height: 280px; flex-shrink: 0; }
@media (min-width: 768px) { #map-wrap { height: 340px; max-height: 340px; } }
@media (min-width: 1024px) { #map-wrap { height: 420px; max-height: 420px; } }
@media (orientation: landscape) and (max-height: 500px) { #map-wrap { height: 45vw; max-height: 220px; } }
#map { position: absolute; inset: 0; z-index: 0; }

/* ── Floating header bubble (iOS 26 style — not pinned to bezel) ── */
.header-bubble {
  position: absolute; top: max(env(safe-area-inset-top,12px),12px); left: 14px; right: 14px;
  z-index: 200; border-radius: 20px; padding: 12px 16px;
  display: flex; align-items: center; justify-content: space-between;
}
.hb-left { display: flex; flex-direction: column; gap: 1px; }
.hb-title { font-size: 20px; font-weight: 700; letter-spacing: -.5px; color: #ffffff; text-shadow: 0 1px 8px rgba(0,0,0,.5); }
.hb-sub { font-size: 12px; font-weight: 400; color: rgba(255,255,255,.85); letter-spacing: -.1px; text-shadow: 0 1px 4px rgba(0,0,0,.3); }
.hb-sun { width: 34px; height: 34px; }

/* ── Wind pill (floating, top-right of map) ── */
.wind-pill {
  position: absolute; top: max(env(safe-area-inset-top,12px),12px); right: 14px; z-index: 300;
  display: none; align-items: center; gap: 6px;
  border-radius: 100px; padding: 7px 13px 7px 8px;
  font-size: 13px; font-weight: 600; color: var(--fg);
}
.wind-pill.on { display: flex; }
#wind-svg-el { width: 20px; height: 20px; flex-shrink: 0; }

/* ── Conditions bar (glass, bottom of map — floats above content) ── */
.conds {
  position: absolute; bottom: 0; left: 14px; right: 14px; z-index: 100;
  border-radius: 16px; display: none; overflow-x: auto; scrollbar-width: none;
  -webkit-overflow-scrolling: touch; white-space: nowrap;
  padding: 10px 14px 12px; gap: 20px; margin-bottom: 10px;
}
.conds::-webkit-scrollbar { display: none; }
.conds.on { display: flex; }
.ci { display: inline-flex; flex-direction: column; gap: 3px; }
.cl { font-size: 10px; font-weight: 600; color: var(--fg2); text-transform: uppercase; letter-spacing: .5px; }
.cv { font-size: 15px; font-weight: 700; letter-spacing: -.3px; }
.cv.sea { color: var(--teal); }

/* ── Sheet (scrollable content below map) ── */
.sheet { flex: 1; background: var(--bg); position: relative; z-index: 10; }
.sheet-top { display: flex; justify-content: center; padding: 8px 0 4px; }
.handle { width: 36px; height: 5px; background: var(--fg3); border-radius: 3px; }

/* ── Day/hour pickers — inside a glass card ── */
.pickers { display: none; margin: 0 14px 10px; border-radius: 18px; overflow: hidden; }
.pickers.on { display: block; }

.day-row { display: flex; overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; padding: 6px 14px 2px; gap: 0; border-bottom: 0.5px solid var(--sep); }
.day-row::-webkit-scrollbar { display: none; }
.dc { flex: 0 0 auto; display: flex; flex-direction: column; align-items: center; padding: 8px 12px 10px; gap: 2px; cursor: pointer; min-width: 56px; border-bottom: 2.5px solid transparent; transition: border-color .18s; }
.dc .dow { font-size: 10px; font-weight: 600; color: var(--fg2); text-transform: uppercase; letter-spacing: .5px; }
.dc .dom { font-size: 22px; font-weight: 300; letter-spacing: -.5px; }
.dc.on { border-bottom-color: var(--blue); }
.dc.on .dom { font-weight: 700; color: var(--blue); }

.hr-row { display: flex; gap: 6px; overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; padding: 10px 14px 12px; }
.hr-row::-webkit-scrollbar { display: none; }
.hc { flex: 0 0 auto; min-width: 56px; height: 34px; display: flex; align-items: center; justify-content: center; border-radius: 100px; background: var(--fill); font-size: 13px; font-weight: 500; color: var(--fg2); cursor: pointer; transition: background .18s, color .18s; letter-spacing: -.2px; }
.hc.on { background: var(--blue); color: #fff; font-weight: 600; }
.hc.now-mark { color: var(--blue); font-weight: 600; }
.hc.on.now-mark { color: #fff; }

/* ── Filter pills — horizontal scroll ── */
.filters { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; -webkit-overflow-scrolling: touch; padding: 4px 14px 10px; }
.filters::-webkit-scrollbar { display: none; }
.fp { flex: 0 0 auto; height: 34px; padding: 0 16px; border-radius: 100px; font-size: 13px; font-weight: 600; color: var(--fg2); cursor: pointer; white-space: nowrap; display: flex; align-items: center; transition: all .2s; background: var(--fill); letter-spacing: -.1px; }
.fp.on { background: var(--fg); color: var(--bg2); }

/* ── Spot cards (iOS 26 style: glass, floating, rounded, no hard edges) ── */
.list { padding: 0 14px; }
.card {
  border-radius: 20px; margin-bottom: 10px; cursor: pointer;
  transition: transform .14s, box-shadow .14s;
  overflow: hidden; position: relative;
  background: var(--bg2);
  box-shadow: 0 1px 12px rgba(0,0,0,.06), 0 0 0 0.5px var(--sep);
}
.card:active { transform: scale(0.982); box-shadow: 0 1px 6px rgba(0,0,0,.04); }

/* quality accent bar — ultra thin top strip */
.qbar { height: 3px; width: 100%; }
.qbar.g { background: linear-gradient(90deg, var(--green), #7ed45e); }
.qbar.o { background: linear-gradient(90deg, var(--orange), #ffc107); }
.qbar.r { background: linear-gradient(90deg, var(--red), #ff8a80); }

.card-inner { display: flex; align-items: center; gap: 14px; padding: 14px 16px; }

/* Animated score ring */
.ring { flex-shrink: 0; width: 52px; height: 52px; position: relative; display: flex; align-items: center; justify-content: center; }
.ring svg { position: absolute; inset: 0; transform: rotate(-90deg); }
.ring-track { fill: none; stroke-width: 4; opacity: .15; }
.ring-fill { fill: none; stroke-width: 4; stroke-linecap: round; transition: stroke-dasharray .6s cubic-bezier(.25,.8,.25,1); }
.ring-num { font-size: 15px; font-weight: 800; letter-spacing: -.6px; z-index: 1; }

.card-body { flex: 1; min-width: 0; }
.card-head { display: flex; align-items: center; gap: 6px; margin-bottom: 3px; }
.card-name { font-size: 16px; font-weight: 700; letter-spacing: -.4px; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.card-tag { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 100px; background: var(--fill); color: var(--fg2); text-transform: uppercase; letter-spacing: .4px; flex-shrink: 0; }
.card-desc { font-size: 13px; color: var(--fg2); line-height: 1.35; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

/* Pill stats row */
.card-pills { display: flex; gap: 6px; flex-wrap: wrap; }
.pill { height: 26px; padding: 0 10px; border-radius: 100px; font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 4px; letter-spacing: -.1px; }
.pill.feel { background: rgba(52,199,89,.13); color: var(--green-text); }
.pill.feel.warm { background: rgba(52,199,89,.22); }
.pill.shelt { background: var(--fill); color: var(--fg2); }
.pill.sea { background: rgba(48,176,199,.13); color: var(--teal-text); }
.pill.rate { background: rgba(255,204,0,.16); color: var(--yellow-text); }

.card-chev { color: var(--fg3); font-size: 18px; flex-shrink: 0; margin-left: 2px; font-weight: 300; }

/* ── Show more button ── */
.show-btn { margin: 0 14px 10px; border-radius: 16px; height: 52px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 600; color: var(--blue); cursor: pointer; background: var(--bg2); box-shadow: 0 1px 8px rgba(0,0,0,.05), 0 0 0 0.5px var(--sep); letter-spacing: -.2px; }

/* ── Loading skeletons ── */
.skel-list { padding: 0 14px; }
.skel { border-radius: 20px; margin-bottom: 10px; height: 96px; background: var(--fill); animation: shimmer 1.5s ease-in-out infinite; }
@keyframes shimmer { 0%,100%{opacity:.7}50%{opacity:.35} }

/* ── Status ── */
.status { display: flex; align-items: center; gap: 8px; padding: 10px 14px; font-size: 14px; color: var(--fg2); }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--blue); animation: shimmer 1.2s ease-in-out infinite; }

/* ── Footer ── */
.foot { padding: 8px 14px calc(16px + env(safe-area-inset-bottom,0)); font-size: 11px; color: var(--fg3); text-align: center; line-height: 1.7; }
.foot a { color: var(--fg2); text-decoration: none; }

/* ── Section label ── */
.sec-label { font-size: 13px; font-weight: 600; color: var(--fg2); text-transform: uppercase; letter-spacing: .5px; padding: 2px 4px 10px; display: none; }

/* ── Leaflet overrides ── */
.leaflet-popup-content-wrapper {
  border-radius: 18px !important;
  box-shadow: 0 8px 32px rgba(0,0,0,.18), 0 0 0 0.5px rgba(0,0,0,.1) !important;
  font-family: var(--f) !important;
  border: none !important;
  background: #ffffff !important;
  color: #000000 !important;
}
@media (prefers-color-scheme:dark) {
  .leaflet-popup-content-wrapper {
    background: #1c1c1e !important;
    color: #ffffff !important;
    box-shadow: 0 8px 32px rgba(0,0,0,.5), 0 0 0 0.5px rgba(255,255,255,.08) !important;
  }
}
.leaflet-popup-content { margin: 14px 16px !important; }
.leaflet-popup-tip-container { display: none; }
.lp-title { font-size: 15px; font-weight: 700; letter-spacing: -.3px; margin-bottom: 2px; color: #000; }
@media (prefers-color-scheme:dark) { .lp-title { color: #fff; } }
.lp-desc { font-size: 12px; color: rgba(60,60,67,.65); margin-bottom: 10px; line-height: 1.4; }
@media (prefers-color-scheme:dark) { .lp-desc { color: rgba(235,235,245,.6); } }
.lp-row { font-size: 13px; line-height: 1.8; color: rgba(60,60,67,.8); }
@media (prefers-color-scheme:dark) { .lp-row { color: rgba(235,235,245,.7); } }
.lp-row b { color: #000; font-weight: 700; }
@media (prefers-color-scheme:dark) { .lp-row b { color: #fff; } }
.lp-water { font-size: 12px; color: #0a7ea4; margin-top: 5px; }
@media (prefers-color-scheme:dark) { .lp-water { color: #5ac8fa; } }
.lp-rating { font-size: 12px; color: rgba(60,60,67,.55); margin-bottom: 6px; }
@media (prefers-color-scheme:dark) { .lp-rating { color: rgba(235,235,245,.5); } }
.leaflet-control-attribution { font-size: 9px !important; background: rgba(255,255,255,.7) !important; backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border-radius: 6px 0 0 0 !important; }

/* Reduce motion */
/* Tablet+ cards: 2-col grid */
@media (min-width: 600px) {
  .list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 0 14px; }
  .card { margin-bottom: 0; }
}
@media (min-width: 1024px) {
  .list { grid-template-columns: 1fr 1fr; }
  .filters { padding: 4px 14px 12px; }
  .pickers { margin: 0 14px 12px; }
}
/* Landscape phone */
@media (orientation:landscape) and (max-height:500px) {
  .header-bubble { padding: 8px 12px; }
  .hb-title { font-size: 17px; }
  .hb-sub { display: none; }
}
@media (prefers-reduced-motion:reduce) { *,::before,::after { animation-duration:.01ms!important; transition-duration:.01ms!important; } }

var D16=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
var DD={};D16.forEach(function(d,i){DD[d]=i*22.5;});
function d2d(deg){return D16[Math.round(((deg%360+360)%360)/22.5)%16];}
function ad(a,b){var d=Math.abs(DD[a]-DD[b]);return d>180?360-d:d;}
function sunPos(dt,lat,lon){
  var r=Math.PI/180,doy=Math.floor((dt-new Date(dt.getFullYear(),0,0))/86400000);
  var decl=23.45*Math.sin(r*(360/365)*(doy-81));
  var h=dt.getHours()+dt.getMinutes()/60,st=h+lon/15-dt.getTimezoneOffset()/60,ha=15*(st-12);
  var alt=Math.asin(Math.sin(r*decl)*Math.sin(r*lat)+Math.cos(r*decl)*Math.cos(r*lat)*Math.cos(r*ha))/r;
  var az=Math.acos((Math.sin(r*decl)-Math.sin(r*alt)*Math.sin(r*lat))/(Math.cos(r*alt)*Math.cos(r*lat)))/r;
  if(ha>0)az=360-az;return{alt:alt,az:az};
}
function fl(t,ws){var wk=ws*3.6;if(t<=10&&wk>=4.8)return 13.12+0.6215*t-11.37*Math.pow(wk,.16)+0.3965*t*Math.pow(wk,.16);if(wk>=4.8)return t-Math.max(0,(ws-2)*.3);return t;}
function sc(spot,w,sun,cl,t){
  var wd=d2d(w.dir),sh=spot.shelter[wd],wf=w.spd*(1-sh),ws=Math.max(0,1-wf/12);
  var ss=0;if(sun.alt>0){var sd=d2d(sun.az),fa=1-ad(spot.facing,sd)/180;ss=Math.min(1,spot.openness*fa*.6+Math.min(1,sun.alt/40)*.4);}
  ss*=(1-(cl/100)*.7);var tot=ws*.55+ss*.45,feel=fl(t,wf);
  if(sun.alt>0&&cl<70)feel+=ss*4*(1-cl/100);
  return{tot:tot,sh:sh,wf:wf,wd:wd,feel:feel};
}
function colr(s,dark){
  if(s>=.65)return{f:dark?'#30d158':'#34c759',stroke:dark?'#1d8a3e':'#1a7a34',css:'g'};
  if(s>=.45)return{f:dark?'#ff9f0a':'#ff9500',stroke:dark?'#7a4a00':'#7a4800',css:'o'};
  return{f:dark?'#ff453a':'#ff3b30',stroke:dark?'#7a2015':'#7a1a15',css:'r'};
}

function fetchFc(){
  return fetch('https://api.open-meteo.com/v1/forecast?latitude=55.6761&longitude=12.5683&hourly=temperature_2m,apparent_temperature,cloud_cover,wind_speed_10m,wind_direction_10m&timezone=Europe/Copenhagen&wind_speed_unit=ms&forecast_days=6')
    .then(function(r){return r.json();})
    .then(function(d){fc={ti:d.hourly.time,te:d.hourly.temperature_2m,ap:d.hourly.apparent_temperature,cl:d.hourly.cloud_cover,ws:d.hourly.wind_speed_10m,wd:d.hourly.wind_direction_10m};})
    .catch(function(){var ti=[],te=[],ap=[],cl=[],ws=[],wd=[];for(var i=0;i<144;i++){var dt=new Date();dt.setHours(dt.getHours()+i,0,0,0);ti.push(dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0')+'T'+String(dt.getHours()).padStart(2,'0')+':00');te.push(11);ap.push(8);cl.push(60);ws.push(5);wd.push(340);}fc={ti:ti,te:te,ap:ap,cl:cl,ws:ws,wd:wd};});
}
function fetchMar(){
  return fetch('https://marine-api.open-meteo.com/v1/marine?latitude=55.6761&longitude=12.5683&hourly=sea_surface_temperature,wave_height&timezone=Europe/Copenhagen&forecast_days=6')
    .then(function(r){return r.json();}).then(function(d){mar={ti:d.hourly.time,sst:d.hourly.sea_surface_temperature,wh:d.hourly.wave_height};})
    .catch(function(){mar=null;});
}
function hidx(day,hr){
  if(!fc)return null;
  var now=new Date(),t=new Date(now);t.setDate(t.getDate()+day);t.setHours(hr,0,0,0);
  var s=t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0')+'T'+String(hr).padStart(2,'0')+':00';
  var i=fc.ti.indexOf(s);return i>=0?i:null;
}
function getW(){
  var i=hidx(selDay,selHr);if(i===null)return null;
  var o={te:fc.te[i],ap:fc.ap[i],cl:fc.cl[i],ws:fc.ws[i],wd:fc.wd[i]};
  if(mar){var mi=mar.ti.indexOf(fc.ti[i]);if(mi>=0){o.sst=mar.sst[mi];o.wh=mar.wh[mi];}}
  return o;
}
function simT(){var now=new Date(),t=new Date(now);t.setDate(t.getDate()+selDay);t.setHours(selHr,0,0,0);return t;}

function mkIcon(s,rank,dark){
  var c=colr(s,dark),sz=Math.round(22+s*12),showR=rank<=3,ex=showR?Math.round(sz*.32):0,tot=sz+ex;
  var rEl=showR?'<circle cx="'+(sz-ex*.4)+'" cy="'+(ex*.5)+'" r="'+(ex*.55)+'" fill="white" stroke="'+c.stroke+'" stroke-width="1.5"/><text x="'+(sz-ex*.4)+'" y="'+(ex*.5+ex*.22)+'" text-anchor="middle" font-size="'+(ex*.6)+'" font-weight="800" font-family="-apple-system,Helvetica" fill="'+c.stroke+'">'+rank+'</text>':'';
  var svg='<svg width="'+tot+'" height="'+(tot+ex)+'" viewBox="0 0 '+tot+' '+(tot+ex)+'" xmlns="http://www.w3.org/2000/svg"><circle cx="'+(sz/2)+'" cy="'+(sz/2+ex)+'" r="'+(sz/2-2)+'" fill="'+c.f+'" stroke="'+c.stroke+'" stroke-width="2" opacity="0.92"/>'+rEl+'</svg>';
  return L.divIcon({className:'',html:svg,iconSize:[tot,tot+ex],iconAnchor:[sz/2,sz/2+ex]});

function renderMarkers(){
  if(!gmap||!fc)return;

  var w=getW();if(!w)return;

  fi.forEach(function(item){
    var isDark2=window.matchMedia&&window.matchMedia('(prefers-color-scheme:dark)').matches;
    var rank=scored.indexOf(item)+1;
    var m=L.marker([item.s.lat,item.s.lon],{icon:mkIcon(item.sc.tot,rank,isDark2),zIndexOffset:Math.round(item.sc.tot*1000)});

    var rt=item.s.rating?'<div class="lp-rating">'+item.s.rating.toFixed(1)+' ⭐ Google rating</div>':'';
    var wa='';if(item.s.water&&w.sst!=null){wa='<div class="lp-water">🌊 '+w.sst.toFixed(1)+'°C';if(w.wh!=null)wa+=' · '+w.wh.toFixed(1)+'m';wa+='</div>';}
    var pop='<div class="lp-title">#'+rank+' '+item.s.name+'</div>'+rt+'<div class="lp-desc">'+item.s.desc+'</div><div class="lp-row">Score <b>'+Math.round(item.sc.tot*100)+'/100</b></div><div class="lp-row">Feels like <b>'+feel+'°C</b></div><div class="lp-row">Shelter '+shp+'% · Wind felt '+item.sc.wf.toFixed(1)+' m/s</div>'+wa;
    m.bindPopup(pop,{maxWidth:260,closeButton:false});
    m.addTo(mLayer);
  });
  var wg=document.getElementById('wind-g');
  if(wg)wg.setAttribute('transform','rotate('+(w.wd+180)+',10,10)');
  document.getElementById('wind-text').textContent=w.ws.toFixed(1)+' m/s '+d2d(w.wd);
  document.getElementById('wind-pill').classList.add('on');
}

/* ── PICKERS ── */
function renderDays(){
  var el=document.getElementById('day-row');el.innerHTML='';
  var now=new Date(),dows=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  for(var i=0;i<6;i++){
    var d=new Date(now);d.setDate(d.getDate()+i);
    var c=document.createElement('div');c.className='dc'+(i===selDay?' on':'');
    c.innerHTML='<div class="dow">'+(i===0?'Today':dows[d.getDay()])+'</div><div class="dom">'+d.getDate()+'</div>';
    (function(idx){c.addEventListener('click',function(){selDay=idx;renderAll();});})(i);
    el.appendChild(c);
  }
}
function renderHrs(){
  var el=document.getElementById('hr-row');el.innerHTML='';
  var nowH=new Date().getHours();
  for(var h=6;h<=22;h++){
    var c=document.createElement('div'),cls='hc';
    if(h===selHr)cls+=' on';if(selDay===0&&h===nowH)cls+=' now-mark';
    c.className=cls;c.textContent=(selDay===0&&h===nowH)?'Now':String(h).padStart(2,'0');
    (function(hr){c.addEventListener('click',function(){selHr=hr;renderAll();});})(h);
    el.appendChild(c);
  }
  setTimeout(function(){var a=el.querySelector('.on');if(a)a.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});},10);
}

/* ── CONDITIONS ── */
function renderConds(){
  var w=getW();if(!w)return;
  var sun=sunPos(simT(),55.6761,12.5683);
  document.getElementById('cv-wind').textContent=w.ws.toFixed(1)+' m/s '+d2d(w.wd);
  document.getElementById('cv-temp').textContent=w.te.toFixed(1)+'°C';
  document.getElementById('cv-feel').textContent=w.ap.toFixed(1)+'°C';
  document.getElementById('cv-cloud').textContent=Math.round(w.cl)+'%';
  document.getElementById('cv-sun').textContent=sun.alt>0?Math.round(sun.alt)+'° '+d2d(sun.az):'Below horizon';
  var wt=w.sst!=null?w.sst.toFixed(1)+'°C'+(w.wh!=null?' '+w.wh.toFixed(1)+'m':''):'—';
  document.getElementById('cv-water').textContent=wt;
  document.getElementById('conds').classList.add('on');
}

/* ── FILTERS ── */
function renderFilters(){
  var el=document.getElementById('filters');el.innerHTML='';
  var types={all:'All'};SPOTS.forEach(function(s){types[s.type]=TYPE_LABELS[s.type]||s.type;});
  Object.keys(types).forEach(function(k){
    var p=document.createElement('div');p.className='fp'+(k===filt?' on':'');p.textContent=types[k];
    p.addEventListener('click',function(){filt=k;showAll=false;renderList();renderFilters();renderMarkers();});
    el.appendChild(p);
  });
}

/* ── RING ── */
function makeRing(s){
  var c=colr(s),r=22,circ=2*Math.PI*r,dash=(s*circ).toFixed(1),gap=(circ*(1-s)).toFixed(1);
  return '<div class="ring"><svg viewBox="0 0 52 52" xmlns="http://www.w3.org/2000/svg"><circle class="ring-track" cx="26" cy="26" r="'+r+'" stroke="'+c.f+'"/><circle class="ring-fill" cx="26" cy="26" r="'+r+'" stroke="'+c.f+'" stroke-dasharray="'+dash+' '+gap+'"/></svg><span class="ring-num" style="color:'+c.stroke+'">'+Math.round(s*100)+'</span></div>';
}

/* ── LIST ── */
function renderList(){
  var w=getW();if(!w)return;
  var sun=sunPos(simT(),55.6761,12.5683),wind={dir:w.wd,spd:w.ws};
  var scored=SPOTS.map(function(s){return{s:s,sc:sc(s,wind,sun,w.cl,w.te)};}).sort(function(a,b){return b.sc.tot-a.sc.tot;});
  var fi=filt==='all'?scored:scored.filter(function(x){return x.s.type===filt;});
  var list=document.getElementById('list');list.innerHTML='';
  var lim=showAll?fi.length:Math.min(8,fi.length);
  document.getElementById('sec-label').style.display='block';
  for(var i=0;i<lim;i++){
    var item=fi[i],s=item.sc.tot,c=colr(s),rank=scored.indexOf(item)+1;
    var feel=item.sc.feel.toFixed(1),delta=item.sc.feel-w.ap;
    var tl=TYPE_LABELS[item.s.type]||item.s.type;
    var pills='<span class="pill feel'+(delta>=2?' warm':'')+'">'+feel+'°C feels like</span>';
    pills+='<span class="pill shelt">'+Math.round(item.sc.sh*100)+'% shelter</span>';
    if(item.s.rating)pills+='<span class="pill rate">'+item.s.rating.toFixed(1)+'⭐</span>';
    if(item.s.water&&w.sst!=null)pills+='<span class="pill sea">🌊 '+w.sst.toFixed(1)+'°C</span>';
    var card=document.createElement('div');card.className='card';
    card.innerHTML='<div class="qbar '+c.css+'"></div><div class="card-inner">'+makeRing(s)+'<div class="card-body"><div class="card-head"><span class="card-name">'+item.s.name+'</span><span class="card-tag">'+tl+'</span></div><div class="card-desc">'+item.s.desc+'</div><div class="card-pills">'+pills+'</div></div><div class="card-chev">›</div></div>';
    (function(spot){card.addEventListener('click',function(){
      if(gmap){gmap.flyTo([spot.lat,spot.lon],15,{duration:.6});}
      mLayer.eachLayer(function(m){if(Math.abs(m.getLatLng().lat-spot.lat)<1e-5&&Math.abs(m.getLatLng().lng-spot.lon)<1e-5)m.openPopup();});
    });})(item.s);
    list.appendChild(card);
  }
  var mw=document.getElementById('more-wrap');mw.innerHTML='';
  if(!showAll&&fi.length>8){var b=document.createElement('div');b.className='show-btn';b.textContent='Show all '+fi.length+' spots';b.addEventListener('click',function(){showAll=true;renderList();});mw.appendChild(b);}
  else if(showAll&&fi.length>8){var b2=document.createElement('div');b2.className='show-btn';b2.textContent='Show fewer';b2.addEventListener('click',function(){showAll=false;renderList();window.scrollTo({top:0,behavior:'smooth'});});mw.appendChild(b2);}
}

/* ── RENDER ALL ── */
function renderAll(){renderDays();renderHrs();renderConds();renderMarkers();renderList();}

/* ── INIT ── */
function init(){
  initMap();
  Promise.all([fetchFc(),fetchMar()]).then(function(){
    document.getElementById('status-row').style.display='none';
    document.getElementById('skels').style.display='none';
    document.getElementById('pickers').classList.add('on');
    selHr=new Date().getHours();
    renderFilters();renderAll();
    var b=L.latLngBounds(SPOTS.map(function(s){return[s.lat,s.lon];}));
    gmap.fitBounds(b,{padding:[28,28]});
    setTimeout(function(){gmap.invalidateSize();},200);
    setInterval(function(){Promise.all([fetchFc(),fetchMar()]).then(renderAll);},15*60*1000);
  });
}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);
else init();
})();
</script>

</body>
</html>
