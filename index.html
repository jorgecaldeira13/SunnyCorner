var TYPE_LABELS = { park: "Parks", garden: "Gardens", beach: "Beaches", harbour: "Harbour", canal: "Canals", plaza: "Plazas", rooftop: "Rooftops", cemetery: "Cemeteries", forest: "Forest", lake: "Lakes", fortress: "Fortress", brygge: "Brygge", cafe: "Bars & Cafés", playground: "Playgrounds 🧒" };

var DIRS=['N','NNE','NE','ENE','E','ESE','SE','SSE','S','SSW','SW','WSW','W','WNW','NW','NNW'];
var DIRDEG={};DIRS.forEach(function(d,i){DIRDEG[d]=i*22.5;});
function d2d(deg){return DIRS[Math.round(((deg%360+360)%360)/22.5)%16];}
function adist(a,b){var d=Math.abs(DIRDEG[a]-DIRDEG[b]);return d>180?360-d:d;}
function sunPos(date,lat,lon){
  var r=Math.PI/180,doy=Math.floor((date-new Date(date.getFullYear(),0,0))/86400000);
  var decl=23.45*Math.sin(r*(360/365)*(doy-81));
  var h=date.getHours()+date.getMinutes()/60,st=h+(lon/15)-date.getTimezoneOffset()/60,ha=15*(st-12);
  var alt=Math.asin(Math.sin(r*decl)*Math.sin(r*lat)+Math.cos(r*decl)*Math.cos(r*lat)*Math.cos(r*ha))/r;
  var az=Math.acos((Math.sin(r*decl)-Math.sin(r*alt)*Math.sin(r*lat))/(Math.cos(r*alt)*Math.cos(r*lat)))/r;
  if(ha>0)az=360-az;return{alt:alt,az:az};
}
function fl(t,ws){var wk=ws*3.6;if(t<=10&&wk>=4.8)return 13.12+0.6215*t-11.37*Math.pow(wk,0.16)+0.3965*t*Math.pow(wk,0.16);if(wk>=4.8)return t-Math.max(0,(ws-2)*0.3);return t;}
function score(spot,wind,sun,cloud,temp){
  var wd=d2d(wind.dir),sh=spot.shelter[wd],wf=wind.spd*(1-sh),ws=Math.max(0,1-wf/12);
  var ss=0;if(sun.alt>0){var sd=d2d(sun.az),fa=1-adist(spot.facing,sd)/180;ss=Math.min(1,spot.openness*fa*0.6+Math.min(1,sun.alt/40)*0.4);}
  ss*=(1-(cloud/100)*0.7);var tot=ws*0.55+ss*0.45,feel=fl(temp,wf);
  if(sun.alt>0&&cloud<70)feel+=ss*4*(1-cloud/100);
  return{tot:tot,sh:sh,wf:wf,wd:wd,feel:feel};
}
function col(s){
  if(s>=0.65)return{f:'#34c759',s:'#1a6e30',t:'#1a6e30'};
  if(s>=0.45)return{f:'#ff9500',s:'#7a4800',t:'#7a4800'};
  return{f:'#ff3b30',s:'#7a1a15',t:'#7a1a15'};
}

var fc=null,mar=null,gmap=null,mLayer=null,selDay=0,selHr=new Date().getHours(),actFilt='all',showAll=false;

function fetchFc(){
  return fetch('https://api.open-meteo.com/v1/forecast?latitude=55.6761&longitude=12.5683&hourly=temperature_2m,apparent_temperature,cloud_cover,wind_speed_10m,wind_direction_10m&timezone=Europe/Copenhagen&wind_speed_unit=ms&forecast_days=6')
    .then(function(r){return r.json();}).then(function(d){
      fc={ti:d.hourly.time,te:d.hourly.temperature_2m,ap:d.hourly.apparent_temperature,cl:d.hourly.cloud_cover,ws:d.hourly.wind_speed_10m,wd:d.hourly.wind_direction_10m};
    }).catch(function(){
      var ti=[],te=[],ap=[],cl=[],ws=[],wd=[];
      for(var i=0;i<144;i++){var dt=new Date();dt.setHours(dt.getHours()+i,0,0,0);ti.push(dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0')+'-'+String(dt.getDate()).padStart(2,'0')+'T'+String(dt.getHours()).padStart(2,'0')+':00');te.push(11);ap.push(8);cl.push(60);ws.push(5);wd.push(340);}
      fc={ti:ti,te:te,ap:ap,cl:cl,ws:ws,wd:wd};
    });
}
function fetchMar(){
  return fetch('https://marine-api.open-meteo.com/v1/marine?latitude=55.6761&longitude=12.5683&hourly=sea_surface_temperature,wave_height&timezone=Europe/Copenhagen&forecast_days=6')
    .then(function(r){return r.json();}).then(function(d){mar={ti:d.hourly.time,sst:d.hourly.sea_surface_temperature,wh:d.hourly.wave_height};})
    .catch(function(){mar=null;});
}
function hidx(day,hr){
  if(!fc)return null;
  var now=new Date(),t=new Date(now);t.setDate(t.getDate()+day);t.setHours(hr,0,0,0);
  var s=t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0')+'T'+String(hr).padStart(2,'0')+':00';
  var i=fc.ti.indexOf(s);return i>=0?i:null;
}
function getW(){
  var i=hidx(selDay,selHr);if(i===null)return null;
  var o={te:fc.te[i],ap:fc.ap[i],cl:fc.cl[i],ws:fc.ws[i],wd:fc.wd[i]};
  if(mar){var mi=mar.ti.indexOf(fc.ti[i]);if(mi>=0){o.sst=mar.sst[mi];o.wh=mar.wh[mi];}}
  return o;
}
function simT(){var now=new Date(),t=new Date(now);t.setDate(t.getDate()+selDay);t.setHours(selHr,0,0,0);return t;}

function initMap(){
  gmap=L.map('map',{zoomControl:true,attributionControl:true}).setView([55.6761,12.5683],13);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,subdomains:'abc',attribution:'© OSM'}).addTo(gmap);
  mLayer=L.layerGroup().addTo(gmap);
}
function mkIcon(s,rank){
  var c=col(s),sz=Math.round(22+s*10),showR=rank<=3,ex=showR?Math.round(sz*0.3):0,tot=sz+ex;
  var rEl=showR?'<circle cx="'+(sz-ex/2)+'" cy="'+(ex/2)+'" r="'+(ex*0.52)+'" fill="white" stroke="'+c.s+'" stroke-width="1.5"/><text x="'+(sz-ex/2)+'" y="'+(ex/2+ex*0.22)+'" text-anchor="middle" font-size="'+(ex*0.58)+'" font-weight="700" font-family="-apple-system,Helvetica" fill="'+c.s+'">'+rank+'</text>':'';
  var svg='<svg width="'+tot+'" height="'+tot+'" viewBox="0 0 '+tot+' '+tot+'" xmlns="http://www.w3.org/2000/svg"><circle cx="'+(sz/2)+'" cy="'+(sz/2+ex)+'" r="'+(sz/2-1.5)+'" fill="'+c.f+'" stroke="'+c.s+'" stroke-width="2" opacity="0.92"/>'+rEl+'</svg>';
  return L.divIcon({className:'',html:svg,iconSize:[tot,tot+ex],iconAnchor:[sz/2,sz/2+ex]});
}
function renderMarkers(){
  if(!gmap||!fc)return;
  mLayer.clearLayers();
  var w=getW();if(!w)return;
  var sun=sunPos(simT(),55.6761,12.5683),wind={dir:w.wd,spd:w.ws};
  var sc=SPOTS.map(function(s){return{s:s,sc:score(s,wind,sun,w.cl,w.te)};}).sort(function(a,b){return b.sc.tot-a.sc.tot;});
  var fi=actFilt==='all'?sc:sc.filter(function(x){return x.s.type===actFilt;});
  fi.forEach(function(item){
    var rank=sc.indexOf(item)+1;
    var m=L.marker([item.s.lat,item.s.lon],{icon:mkIcon(item.sc.tot,rank),zIndexOffset:Math.round(item.sc.tot*1000)});
    var fl2=item.sc.feel.toFixed(1),shp=Math.round(item.sc.sh*100);
    var rt=item.s.rating?'<div class="lp-rt">'+item.s.rating.toFixed(1)+' ⭐</div>':'';
    var wa='';if(item.s.water&&w.sst!=null){wa='<div class="lp-w">🌊 '+w.sst.toFixed(1)+'°C';if(w.wh!=null)wa+=' · '+w.wh.toFixed(1)+'m';wa+='</div>';}
    var pop='<div class="lp-t">#'+rank+' '+item.s.name+'</div>'+rt+'<div class="lp-d">'+item.s.desc+'</div><div class="lp-r">Score: <strong>'+Math.round(item.sc.tot*100)+'/100</strong></div><div class="lp-r">Feels like: <strong>'+fl2+'°C</strong></div><div class="lp-r">Shelter: '+shp+'% · Wind felt: '+item.sc.wf.toFixed(1)+' m/s</div>'+wa;
    m.bindPopup(pop,{maxWidth:250,closeButton:false});m.addTo(mLayer);
  });
  var g=document.getElementById('wind-g');
  if(g)g.setAttribute('transform','rotate('+(w.wd+180)+',10,10)');
  document.getElementById('wind-badge-text').textContent=w.ws.toFixed(1)+' m/s '+d2d(w.wd);
  document.getElementById('wind-badge').classList.add('show');
}

function ring(s){

  var lim=showAll?fi.length:Math.min(8,fi.length);
  document.getElementById('list-head').style.display='block';
  for(var i=0;i<lim;i++){
    var item=fi[i],s=item.sc.tot,q=s>=0.65?'g':s>=0.45?'o':'r';
    var fl2=item.sc.feel.toFixed(1),delta=item.sc.feel-w.ap,rank=sc.indexOf(item)+1;
    var tl=TYPE_LABELS[item.s.type]||item.s.type;
    var meta='<span class="mi'+(delta>=2?' warm':'')+'"><span class="v">'+fl2+'°C</span> feels</span>';
    meta+='<span class="mi"><span class="v">'+Math.round(item.sc.sh*100)+'%</span> shelter</span>';
    meta+='<span class="mi"><span class="v">'+item.sc.wf.toFixed(1)+'m/s</span> felt</span>';
    if(item.s.rating)meta+='<span class="mi"><span class="v">'+item.s.rating.toFixed(1)+'⭐</span></span>';
    if(item.s.water&&w.sst!=null)meta+='<span class="mi sea"><span class="v">🌊 '+w.sst.toFixed(1)+'°C</span></span>';
    var card=document.createElement('div');card.className='card';
    card.innerHTML='<div class="qbar '+q+'"></div><div class="card-inner">'+ring(s)+'<div class="cb"><div class="cnr"><span class="cn">'+item.s.name+'</span><span class="ct">'+tl+'</span></div><div class="cd">'+item.s.desc+'</div><div class="cm">'+meta+'</div></div><div class="chev">›</div></div>';
    (function(spot){card.addEventListener('click',function(){
      if(gmap){gmap.flyTo([spot.lat,spot.lon],15,{duration:0.6});}
      mLayer.eachLayer(function(m){if(Math.abs(m.getLatLng().lat-spot.lat)<1e-5&&Math.abs(m.getLatLng().lng-spot.lon)<1e-5)m.openPopup();});
    });})(item.s);
    list.appendChild(card);
  }
  var mw=document.getElementById('more-wrap');mw.innerHTML='';
  if(!showAll&&fi.length>8){var b=document.createElement('div');b.className='show-btn';b.textContent='Show all '+fi.length+' spots';b.addEventListener('click',function(){showAll=true;renderList();});mw.appendChild(b);}
  else if(showAll&&fi.length>8){var b2=document.createElement('div');b2.className='show-btn';b2.textContent='Show fewer';b2.addEventListener('click',function(){showAll=false;renderList();window.scrollTo({top:0,behavior:'smooth'});});mw.appendChild(b2);}
}
function renderAll(){renderDays();renderHrs();renderCond();renderMarkers();renderList();}
function init(){
  initMap();
  Promise.all([fetchFc(),fetchMar()]).then(function(){
    document.getElementById('status-row').style.display='none';
    document.getElementById('skels').style.display='none';
    document.getElementById('pickers').classList.add('show');
    selHr=new Date().getHours();
    renderFilters();renderAll();
    var b=L.latLngBounds(SPOTS.map(function(s){return[s.lat,s.lon];}));
    gmap.fitBounds(b,{padding:[24,24]});
    setTimeout(function(){gmap.invalidateSize();},200);
    setInterval(function(){Promise.all([fetchFc(),fetchMar()]).then(renderAll);},15*60*1000);
  });
}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);
else init();
})();
</script>
</body>
</html>
